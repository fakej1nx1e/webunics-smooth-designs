<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Save the original path for React Router
      sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
      // Leite auf die Hauptseite weiter (SPA Entry Point)
      location.href = '/webunics/';
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
